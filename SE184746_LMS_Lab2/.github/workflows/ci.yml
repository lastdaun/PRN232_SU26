name: CI – Build & Code Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore SE184746_LMS_Lab1.sln

      - name: Build (warnings as errors)
        run: dotnet build SE184746_LMS_Lab1.sln --no-restore -warnaserror

      - name: Check code formatting
        run: dotnet format SE184746_LMS_Lab1.sln --verify-no-changes --severity warn --exclude "**/Migrations/**"
